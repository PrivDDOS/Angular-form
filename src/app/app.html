<div class="w-75 vh-100 container d-flex justify-content-center flex-row py-5">
  <div class="container-left w-25 h-100">
    <div class="image-container position-relative h-100">
      <img src="/assets/images/bg-sidebar-desktop.svg" alt="background" />

      <div class="text-overlay w-auto d-flex justify-content-center align-items-center gap-0">
        <h5
          class="w-35px h-35px d-flex align-items-center justify-content-center border border-white rounded-circle"
          [ngClass]="formStep === 1 ? 'bg-active text-dark-blue' : 'bg-transparent text-white'"
        >
          1
        </h5>
        <div class="d-flex flex-column ms-3">
          <p class="text-white text-uppercase small m-0">step 1</p>
          <p class="text-white text-uppercase fs-6">Your Info</p>
        </div>
      </div>

      <div class="text-overlay w-auto d-flex justify-content-center align-items-center gap-0">
        <h5
          class="w-35px h-35px d-flex align-items-center justify-content-center border border-white rounded-circle"
          [ngClass]="formStep === 2 ? 'bg-active text-dark-blue' : 'bg-transparent text-white'"
        >
          2
        </h5>
        <div class="d-flex flex-column ms-3">
          <p class="text-white text-uppercase small m-0">step 2</p>
          <p class="text-white text-uppercase fs-6">Select Plan</p>
        </div>
      </div>

      <div class="text-overlay w-auto d-flex justify-content-center align-items-center gap-0">
        <h5
          class="w-35px h-35px d-flex align-items-center justify-content-center border border-white rounded-circle"
          [ngClass]="formStep === 3 ? 'bg-active text-dark-blue' : 'bg-transparent text-white'"
        >
          3
        </h5>
        <div class="d-flex flex-column ms-3">
          <p class="text-white text-uppercase small m-0">step 3</p>
          <p class="text-white text-uppercase fs-6">Add-ons</p>
        </div>
      </div>

      <div class="text-overlay w-auto d-flex justify-content-center align-items-center gap-0">
        <h5
          class="w-35px h-35px d-flex align-items-center justify-content-center border border-white rounded-circle"
          [ngClass]="formStep === 4 ? 'bg-active text-dark-blue' : 'bg-transparent text-white'"
        >
          4
        </h5>
        <div class="d-flex flex-column ms-3">
          <p class="text-white text-uppercase small m-0">step 4</p>
          <p class="text-white text-uppercase fs-6">Summary</p>
        </div>
      </div>
    </div>
  </div>

  <div class="container-right w-75 h-100 py-5 ps-5">
    <form #clientForm="ngForm" (ngSubmit)="onSubmit(clientForm)">
      <div *ngIf="formStep === 1">
        <div class="pb-2">
          <h3 class="fw-bold text-dark-blue">Personal info</h3>
          <p class="small text-dark-blue">please provide your name, email address and phone number.</p>
        </div>

        <div class="d-flex flex-column w-55">
          <label for="name" class="pb-2">Name</label>
          <input type="text" id="name" name="name" placeholder="e.g. Evan Fong" [(ngModel)]="clientInfo.name" required class="p-2">

          <label for="name" class="pb-2 pt-4">Email Address</label>
          <input type="text" id="name" name="name" placeholder="e.g. evanfong@can.com" [(ngModel)]="clientInfo.email" required class="p-2">

          <label for="name" class="pb-2 pt-4">Phone Number</label>
          <input type="text" id="name" name="name" placeholder="e.g. +1 234 567 8900" [(ngModel)]="clientInfo.phoneNum" required class="p-2">
        </div>

        <button type="button" class="btn btn-custom text-white">Next Step</button>

      </div>



    </form>
  </div>
</div>

<router-outlet></router-outlet>
